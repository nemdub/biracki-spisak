name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate processed-localities manifest
        run: bash generate_manifest.sh

      - name: Assemble publish directory
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/web dist/data/processed
          cp -R web/. dist/web/
          cp data/localities.json dist/data/
          cp -R data/processed/biraci_po_adresi dist/data/processed/
          printf '/    /web/    301\n' > dist/_redirects
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt

      - name: Deploy to Netlify
        run: >
          npx --yes netlify-cli@17 deploy
          --prod
          --dir=dist
          --site="$NETLIFY_SITE_ID"
          --auth="$NETLIFY_AUTH_TOKEN"
          --message="Deploy ${GITHUB_SHA::7}"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
