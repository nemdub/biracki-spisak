name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false   # pull LFS manually below so the 739 MB registry can be cached

      # data/kucni_broj.csv (~739 MB) lives in Git LFS. Cache it across runs so we
      # don't re-pull it (and burn LFS bandwidth) on every deploy. With lfs:false
      # the working-tree file is the small LFS pointer, so hashFiles() keys on the
      # pointer's OID and the cache busts only when the registry actually changes.
      - name: Cache LFS address registry
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: data/kucni_broj.csv
          key: lfs-kucni-broj-${{ hashFiles('data/kucni_broj.csv') }}

      - name: Pull LFS registry (on cache miss)
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: git lfs pull --include="data/kucni_broj.csv"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyproj

      # Regenerates web/javni_objekti_report.json and web/javni_objekti_sa_biracima.csv
      # from kucni_broj.csv + objekti.csv + committed voter data (data/processed/,
      # 85 localities — same set the viewer serves). output/ is git-ignored so this
      # run is processed-only by construction.
      - name: Run address ↔ voter ↔ building matching
        run: python3 javni_objekti_biraci.py

      - name: Generate processed-localities manifest
        run: bash generate_manifest.sh

      - name: Assemble publish directory
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/data/processed
          cp -R web/. dist/
          cp data/localities.json dist/data/
          cp -R data/processed/biraci_po_adresi dist/data/processed/
          printf '/web/*    /:splat    301\n' > dist/_redirects
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt

      # Assembles the downloadable CSV bundles into dist/data/exports/:
      # one zipped CSV of all served localities + an exports.json manifest the
      # viewer reads to show the bundle size. Per-locality CSVs are already
      # served from dist/data/processed/, so they need no extra step.
      - name: Build CSV export bundles
        run: bash generate_exports.sh dist/data/exports

      - name: Deploy to Netlify
        run: >
          npx --yes netlify-cli@17 deploy
          --prod
          --dir=dist
          --site="$NETLIFY_SITE_ID"
          --auth="$NETLIFY_AUTH_TOKEN"
          --message="Deploy ${GITHUB_SHA::7}"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
